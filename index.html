<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>奧米爾 - 戰鬥測試 (簡約版)</title>
<style>
    body { background: #0a0a0a; color: #eee; text-align: center; font-family: '微軟正黑體', sans-serif; }
    #game-board { max-width: 800px; margin: 20px auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #332b1a; }
    .status-bar { display: flex; justify-content: space-between; padding: 15px; background: #222; border-radius: 10px; margin-bottom: 20px; }
    #hand { display: flex; justify-content: center; gap: 15px; min-height: 180px; flex-wrap: wrap; }
    /* 卡牌設計：只有名稱 */
    .card { background: #222; border: 1px solid #444; border-radius: 8px; width: 120px; height: 160px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .card:hover { border-color: #ffd43b; transform: translateY(-5px); }
    #log { height: 100px; overflow-y: auto; background: #000; text-align: left; padding: 10px; margin-top: 20px; font-size: 13px; color: #888; }
</style>
</head>
<body>

<div id="game-board">
    <div class="status-bar">
        <div>奧米爾 HP:<span id="p-hp">80</span> | 能量:<span id="energy">3</span></div>
        <div>阿提密斯 HP:<span id="e-hp">200</span> | 水壓:<span id="e-water">0</span>/2</div>
    </div>
    <div id="hand"></div>
    <button onclick="endTurn()" style="padding:10px 20px; cursor:pointer;">結束回合</button>
    <div id="log"></div>
</div>

<script>
let player = { hp: 80, energy: 3, stance: "Normal" };
let enemy = { hp: 200, waterPressure: 0 };
let hand = [], drawPile = [];

const allCards = [
    { name: '快斬', cost: 1, play: () => dealDmg(9) },
    { name: '搖鈴', cost: 0, play: () => drawCards(1) },
    { name: '藏鋒重擊', cost: 2, play: () => dealDmg(player.stance === "鳴金" ? 28 : 14) },
    { name: '鳴陣', cost: 1, play: () => { player.stance = "鳴金"; } },
    { name: '缺氧', cost: 1, play: () => drawCards(1), exhaust: true }
];

function drawCards(n) {
    for(let i=0; i<n; i++) if(drawPile.length > 0) hand.push(drawPile.pop());
    render();
}

function dealDmg(a) { enemy.hp -= a; addLog(`造成 ${a} 傷害`); render(); }

function endTurn() {
    enemy.waterPressure++;
    if(enemy.waterPressure >= 2) { 
        drawPile.push(allCards[4]); // 塞入缺氧
        enemy.waterPressure = 0; 
    }
    player.energy = 3;
    drawCards(5);
    render();
}

function render() {
    document.getElementById('p-hp').innerText = player.hp;
    document.getElementById('e-hp').innerText = enemy.hp;
    document.getElementById('e-water').innerText = enemy.waterPressure;
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';
    hand.forEach((c, i) => {
        let el = document.createElement('div');
        el.className = 'card';
        el.innerText = c.name; // 只顯示名稱
        el.onclick = () => { if(player.energy >= c.cost) { player.energy -= c.cost; c.play(); hand.splice(i, 1); render(); } };
        handDiv.appendChild(el);
    });
}

function addLog(m) { document.getElementById('log').innerHTML += `<div>${m}</div>`; }
drawPile = [allCards[0], allCards[1], allCards[2], allCards[3], allCards[0]];
drawCards(3);
render();
</script>
</body>
</html>
