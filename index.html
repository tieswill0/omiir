<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>奧米爾 - 戰鬥測試 (完整版)</title>
<style>
    body { font-family: sans-serif; background: #111; color: #eee; text-align: center; padding: 20px; }
    #game-board { max-width: 800px; margin: auto; background: #222; padding: 20px; border-radius: 10px; }
    .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
    #hand { display: flex; justify-content: center; gap: 10px; min-height: 150px; margin-bottom: 20px; }
    .card { background: #333; padding: 10px; border: 1px solid #555; cursor: pointer; border-radius: 5px; width: 100px; }
    .card:hover { background: #444; }
    #log { height: 150px; overflow-y: auto; background: #000; text-align: left; padding: 10px; font-size: 14px; }
</style>
</head>
<body>

<div id="game-board">
    <div class="status-bar">
        <div>奧米爾 HP:<span id="p-hp">80</span> | 格擋:<span id="p-block">0</span> | 能量:<span id="energy">3</span></div>
        <div>阿提密斯 HP:<span id="e-hp">200</span> | 水壓:<span id="e-water">0</span>/2</div>
    </div>
    <div id="hand"></div>
    <button onclick="endTurn()">結束回合</button>
    <div id="log"></div>
</div>

<script>
let player = { hp: 80, block: 0, energy: 3 };
let enemy = { hp: 200, waterPressure: 0, turn: 0 };
let hand = [], drawPile = [], discardPile = [];

const suffocation = { name: '缺氧', cost: 1, desc: '消耗。抽1張牌。', play: () => drawCards(1), exhaust: true };

const allCards = [
    { name: '快斬', cost: 1, play: () => dealDmg(9) },
    { name: '搖鈴', cost: 0, play: () => drawCards(1) },
    { name: '藏鋒重擊', cost: 2, play: () => dealDmg(player.stance === "鳴金" ? 28 : 14) },
    { name: '鳴陣', cost: 1, play: () => { player.stance = "鳴金"; player.block += 4; } }
];

function shuffle(a) { for(let i=a.length-1; i>0; i--) { let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } }
function drawCards(n) {
    for(let i=0; i<n; i++) {
        if(drawPile.length === 0) { drawPile = [...discardPile]; discardPile = []; shuffle(drawPile); }
        if(hand.length < 10) hand.push(drawPile.pop());
    }
    render();
}

function dealDmg(a) { enemy.hp -= a; addLog(`造成 ${a} 傷害`); render(); }

function endTurn() {
    // 阿提密斯水壓機制
    enemy.waterPressure++;
    addLog(`阿提密斯增加水壓，目前層數: ${enemy.waterPressure}`);
    if(enemy.waterPressure >= 2) {
        addLog("水壓到達極限！抽牌堆塞入【缺氧】");
        drawPile.push({...suffocation});
        shuffle(drawPile);
        enemy.waterPressure = 0;
    }
    
    // 簡單 Boss 攻擊邏輯
    player.hp -= 10;
    player.energy = 3;
    player.block = 0;
    drawCards(5);
    render();
}

function render() {
    document.getElementById('p-hp').innerText = player.hp;
    document.getElementById('e-hp').innerText = enemy.hp;
    document.getElementById('e-water').innerText = enemy.waterPressure;
    const handDiv = document.getElementById('hand');
    handDiv.innerHTML = '';
    hand.forEach((c, i) => {
        let el = document.createElement('div');
        el.className = 'card';
        el.innerText = c.name;
        el.onclick = () => { c.play(); hand.splice(i, 1); render(); };
        handDiv.appendChild(el);
    });
}

function addLog(m) { let l = document.getElementById('log'); l.innerHTML += `<div>${m}</div>`; }

// 初始化
drawPile = [...allCards, ...allCards];
shuffle(drawPile);
drawCards(5);
render();
</script>
</body>
</html>
